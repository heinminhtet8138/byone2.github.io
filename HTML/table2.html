<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Invoice</h1>
    <table border="1" cellspacing="0" cellpadding="30">
        <thead>
            <tr>
                <th>No.</th>
                <th>Item Name</th>
                <th>Price</th>
                <th>Qty</th>
                <th>Amount</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>1</td>
                <td>Signal</td>
                <td>9000</td>
                <td>1</td>
                <td>9000</td>
            </tr>
            <tr>
                <td>2</td>
                <td>MaMa Noddle</td>
                <td>1300</td>
                <td>5</td>
                <td>6500</td>
            </tr>
            <tr>
                <td>3</td>
                <td>Egg</td>
                <td>500</td>
                <td>10</td>
                <td>5000</td>
            </tr>
        </tbody>
        <tfoot>
            <tr>
                <th colspan="4" align="right">Total</th>
                <th>20500</th>
            </tr>
        </tfoot>
    </table>

    <h1>Saving Money</h1>
    <table border="1" cellspacing="0" cellpadding="30">
        <thead>
            <tr>
                <th>Months</th>
                <th>Save Money</th>
                <th>Total</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>January</td>
                <td>100000</td>
                <td rowspan="4">400000</td>
            </tr>
            <tr>
                <td>February</td>
                <td>50000</td>
            </tr>
            <tr>
                <td>March</td>
                <td>100000</td>
            </tr>
            <tr>
                <td>April</td>
                <td>150000</td>
            </tr>
        </tbody>
    </table>
</body>
</html>
