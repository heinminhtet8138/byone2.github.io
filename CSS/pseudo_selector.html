<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        h1 a:hover {
            color: red;
            font-size: 50px;
            background-color: black;
        }

        h1:hover {
            color: aqua;
        }

        h2 a:link {
            color: orange;
        }

        h2 a:visited {
            color: green;
        }

        h2 a:active {
            color: yellow;
        }

        input[type="text"]:focus {
            background-color: brown;
            color: white;
        }

        ul li:first-child {
            color: red;
        }

        ul li:last-child {
            color: green;
        }
    </style>
</head>
<body>
    <h1>Pseudo Selector</h1>
    <h1>
        <a href="">Hover Selector</a>
    </h1>

    <h2>
        <a href="https://google.com" target="_blank">Google</a>
        <a href="https://technewsworld.com" target="_blank">Tech News World</a>
        <a href="https://cncb.com" target="_blank">CNCB</a>
    </h2>

    <input type="text" name="" id="">

    <ul>
        <li>HTML</li>
        <li>CSS</li>
        <li>JavaScript</li>
        <li>PHP</li>
    </ul>
</body>
</html>
