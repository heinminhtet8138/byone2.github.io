<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        .flex-container {
            display: flex;
            background-color: aqua;
            height: 200px;
            gap: 20px;

             /* 
                justify-content - ဘေးဘယ်ညာညှိ
                - flex-start - ဘယ်ညီညှိ
                - flex-end - ညာညီညှိ
                - center - အလယ်ညီ ညှိ
                - space-between - ဘေးဘယ်ညာအညီညှပြီး ကြား space ကို ညီတူညီမျှယူ 
            */
            justify-content: center;

            /*  
                align-items - ပေါ်အောက်ညှိ 
                - flex-start - အပေါ်ညှိ
                - flex-end - အောက်ညှိ 
                - center - အလယ်ညှိ 
            */
            align-items: center;
        }

        .flex-item {
            background-color: lightblue;
            padding: 10px;
        }
    </style>
</head>
<body>
    <div class="flex-container">
        <div class="flex-item">Item 1</div>
        <div class="flex-item">Item 2</div>
        <div class="flex-item">Item 3</div>

    </div>
</body>
</html>
