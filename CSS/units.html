<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        /* 
            Absolute unit - အရွယ်အစားကို အသေသက်မှတ် 
                    - px (pixel) - border, box shadows, tex shadow, border radius, max-width limits
                    - pt (point) cm, mm, in - print ထုက်ဖို့သုံး
        */

        button {
            border: 1px solid red;
            padding: 10px 100px;
        }

        /* Relative units  */
        /* percentage % */

        .container {
            background-color: red;
            margin-top: 30px;
            width: 50%;
        }

        .box {
            background-color: gray;
            width: 50%;
            padding: 2%;
        }

        /* em (element) - parent element ပေါ်မူပြီးလုပ်  */
        .em-container {
            font-size: 30px;
        }

        .normal-text {
            /* 1em x 30px = 30px */
            font-size: 1em;
        }

        .large-text {
            /* 2em x 30px =  60px */
            font-size: 2em;
        }
        
    </style>
</head>
<body>
    <button>Save</button>

    <div class="container">
        <div class="box">Box</div>
    </div>

    <!-- em -->
    <div class="em-container">
        <p class="normal-text">Normal Text</p>
        <p class="large-text">Large Text</p>
    </div>

    <div class="em-box">
        <p>box content</p>
    </div>
</body>
</html>
