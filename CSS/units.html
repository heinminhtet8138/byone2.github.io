<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        /* 
            Absolute unit - အရွယ်အစားကို အသေသက်မှတ် 
                    - px (pixel) - border, box shadows, tex shadow, border radius, max-width limits
                    - pt (point) cm, mm, in - print ထုက်ဖို့သုံး
        */

        button {
            border: 1px solid red;
            padding: 10px 100px;
        }

        /* Relative units  */
        /* percentage % */

        .container {
            background-color: red;
            margin-top: 30px;
            width: 50%;
        }

        .box {
            background-color: gray;
            width: 50%;
            padding: 2%;
        }

        /* em (element) - parent element ပေါ်မူပြီးလုပ်  */
        .em-container {
            font-size: 30px;
        }

        .normal-text {
            /* 1em x 30px = 30px */
            font-size: 1em;
        }

        .large-text {
            /* 2em x 30px =  60px */
            font-size: 2em;
        }

        .em-box {
            font-size: 20px;
        }

        .em-box p {
            border: 1px solid black;
            padding: 1em;
            margin: 2em;
        }
        
        /* root element (rem) - သူက root element ပေါ်မူတည်ပြီးအလုပ်လုပ် -root က html element  
            default - 16px
        */

        html {
            font-size: 32px;
        }
        .header {

            /* 1rem x 32px = 32px */
            font-size: 1rem;
        }

        .title {
            /* 2rem x 32px = 64px */
            font-size: 2rem;
        }

        .description {
            font-size: 1rem;
            margin-top: 3rem;
        }

        /* vw -vewport width 
            1vw = 1%
        */
        .vw-container {
            background-color: lightblue;
            height: 200px;
            width: 50vw;
            font-size: 2vw;
        }

        /* vh - viewport height
            1vh = 1%
        */
        .fullscreen-header {
            background-color: lightcoral;
            height: 100vh;
        }
    </style>
</head>
<body>
    <button>Save</button>

    <div class="container">
        <div class="box">Box</div>
    </div>

    <!-- em -->
    <div class="em-container">
        <p class="normal-text">Normal Text</p>
        <p class="large-text">Large Text</p>
    </div>

    <div class="em-box">
        <p>box content</p>
    </div>

    <!-- rem -->
    <div class="header">
        <p class="title">Title</p>
        <p class="description">This is rem.</p>
    </div>

    <!-- viewport width -->

    <div class="vw-container">
        <p>This is viewport width</p>
    </div>

    <!-- viewport height -->
    <div class="fullscreen-header">
        <p>This is header take up 100vh</p>
    </div>
</body>
</html>
